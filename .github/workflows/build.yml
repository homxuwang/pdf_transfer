name: Build Windows EXE

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable
        shell: powershell
        run: .\build_exe.ps1

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: MinerUPdfTool-windows
          path: dist/MinerUPdfTool.exe
          if-no-files-found: error

      - name: Update latest-build tag
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest-build
          git push origin refs/tags/latest-build --force

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-build
          name: Latest Build
          prerelease: true
          make_latest: false
          generate_release_notes: true
          body: |
            Auto-updated Windows build from the latest push.
          files: dist/MinerUPdfTool.exe
